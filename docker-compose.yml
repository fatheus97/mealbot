services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mealbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend  # This tells Docker to look INSIDE the backend folder
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000" # Assuming you need to reach FastAPI from your host
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-mealbot}

  frontend:
    build: ./frontend
    ports:
      - "5173:80"  # Map host 5173 to container 80

volumes:
  pgdata: